# Sim-specific controller config for mujoco_ros2_control.
# Uses position-only command interfaces because MuJoCo <position> actuators
# handle PD control natively at the physics timestep (500 Hz).
# The real-hardware controllers.yaml keeps position+velocity for CAN feedforward.
controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_leg_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_leg_controller:
      type: joint_trajectory_controller/JointTrajectoryController

right_arm_controller:
  ros__parameters:
    joints:
      - dof_right_shoulder_pitch_03
      - dof_right_shoulder_roll_03
      - dof_right_shoulder_yaw_02
      - dof_right_elbow_02
      - dof_right_wrist_00
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    open_loop_control: false
    allow_integration_in_goal_trajectories: true

left_arm_controller:
  ros__parameters:
    joints:
      - dof_left_shoulder_pitch_03
      - dof_left_shoulder_roll_03
      - dof_left_shoulder_yaw_02
      - dof_left_elbow_02
      - dof_left_wrist_00
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    open_loop_control: false
    allow_integration_in_goal_trajectories: true

right_leg_controller:
  ros__parameters:
    joints:
      - dof_right_hip_pitch_04
      - dof_right_hip_roll_03
      - dof_right_hip_yaw_03
      - dof_right_knee_04
      - dof_right_ankle_02
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    open_loop_control: false
    allow_integration_in_goal_trajectories: true

left_leg_controller:
  ros__parameters:
    joints:
      - dof_left_hip_pitch_04
      - dof_left_hip_roll_03
      - dof_left_hip_yaw_03
      - dof_left_knee_04
      - dof_left_ankle_02
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    open_loop_control: false
    allow_integration_in_goal_trajectories: true
